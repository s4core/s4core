global
    maxconn 8192
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option forwardfor
    timeout http-request 60s
    timeout http-keep-alive 30s
    timeout connect 5s
    timeout client  10m
    timeout server  10m
    timeout client-fin 30s
    timeout server-fin 30s
    retries 3
    retry-on conn-failure

frontend s4_http
    bind *:9000
    default_backend s4_nodes

backend s4_nodes
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    server s4-p1-node1 s4-p1-node1:9000 check inter 3s fall 3 rise 2
    server s4-p1-node2 s4-p1-node2:9000 check inter 3s fall 3 rise 2
    server s4-p1-node3 s4-p1-node3:9000 check inter 3s fall 3 rise 2
    server s4-p2-node1 s4-p2-node1:9000 check inter 3s fall 3 rise 2
    server s4-p2-node2 s4-p2-node2:9000 check inter 3s fall 3 rise 2
    server s4-p2-node3 s4-p2-node3:9000 check inter 3s fall 3 rise 2

frontend stats
    bind *:8404
    stats enable
    stats uri /
    stats refresh 10s
